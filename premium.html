<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModdingKingz — Premium Mod</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #07000f;
      background-image:
        radial-gradient(ellipse at 15% 45%, rgba(110, 0, 220, 0.13) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 10%, rgba(140, 0, 255, 0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 95%, rgba(80, 0, 180, 0.1) 0%, transparent 50%);
      background-attachment: fixed;
      color: #e0d0ff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(120, 0, 220, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120, 0, 220, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, #110020, #0c0018);
      border: 1px solid #3d006a;
      border-radius: 12px;
      padding: 3.5rem 3rem 3rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(130, 0, 255, 0.15), 0 20px 60px rgba(0,0,0,0.6);
    }

    .logo {
      height: 80px;
      width: auto;
      margin-bottom: 2.2rem;
      filter: drop-shadow(0 0 12px rgba(160, 0, 255, 0.5));
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 1.1rem;
      background: rgba(150, 0, 255, 0.12);
      border: 1px solid rgba(150, 0, 255, 0.35);
      border-radius: 2px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: #aa55ff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
    }

    .headline {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 1.2rem;
      text-shadow: 0 0 14px #9900ff, 0 0 30px #6600aa;
      line-height: 1.3;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #9900ff, transparent);
      margin: 0 auto 1.6rem;
    }

    .body-text {
      font-size: 1.05rem;
      color: #a080cc;
      line-height: 1.7;
      margin-bottom: 0.8rem;
      letter-spacing: 0.5px;
    }

    .body-text strong {
      color: #d0a0ff;
      font-weight: 600;
    }

    .note {
      font-size: 0.8rem;
      color: #5c3880;
      letter-spacing: 1px;
      margin-bottom: 2.5rem;
    }

    .btn-instagram {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, #5500aa, #aa00ff);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 2.5px;
      text-decoration: none;
      border-radius: 4px;
      text-transform: uppercase;
      box-shadow: 0 0 22px rgba(160, 0, 255, 0.45), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-instagram::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.4s ease;
    }

    .btn-instagram:hover::before { left: 100%; }

    .btn-instagram:hover {
      box-shadow: 0 0 35px rgba(190, 0, 255, 0.8), 0 0 70px rgba(150, 0, 255, 0.35);
      transform: translateY(-2px);
    }

    .btn-instagram svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- logo.png im Hauptordner ablegen -->
    <img src="logo.png" alt="ModdingKingz" class="logo">

    <div class="badge">Premium Mod</div>

    <h1 class="headline">This is not<br>a free mod.</h1>
    <div class="divider"></div>

    <p class="body-text">
      To get access to this mod,<br>
      <strong>make an offer via Instagram.</strong>
    </p>
    <p class="note">DM us with your offer — we'll get back to you.</p>

    <!-- Instagram-Link hier eintragen -->
    <a href="https://instagram.com/DEIN-USERNAME" target="_blank" rel="noopener" class="btn-instagram">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
      Contact on Instagram
    </a>
  </div>
</body>
</html>
